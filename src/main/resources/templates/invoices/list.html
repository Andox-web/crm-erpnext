<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{base}">
<head>
    <title>Gestion Comptable</title>
</head>
<body>
    <div layout:fragment="content" class="content container-fluid">
        <!-- Contenu principal -->
        <div class="card shadow">
            <div class="card-body">
                <!-- Filtres -->
                <div class="d-flex justify-content-between mb-3">
                    <div class="btn-group">
                        <button type="button" class="btn btn-outline-secondary dropdown-toggle"
                                data-bs-toggle="dropdown">
                            Statut: [[${statusFilter ?: 'Tous'}]]
                        </button>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" 
                                   th:href="@{'/accounting/' + ${invoiceType}}">Tous</a></li>
                            <li><a class="dropdown-item" 
                                   th:href="@{'/accounting/' + ${invoiceType}(status='Paid')}">Payées</a></li>
                            <li><a class="dropdown-item" 
                                   th:href="@{'/accounting/' + ${invoiceType}(status='Unpaid')}">Impayées</a></li>
                        </ul>
                    </div>
                </div>

                <!-- Tableau -->
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead class="table-light">
                            <tr>
                                <th>N° Facture</th>
                                <th>Date</th>
                                <th>Échéance</th>
                                <th>Partie</th>
                                <th>Statut</th>
                                <th class="text-end">Montant</th>
                                <th class="text-end">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="invoice : ${invoices}" th:data-invoice-id="${invoice.id}" th:data-company="${invoice.company}">
                                <td th:text="${invoice.number}"></td>
                                <td th:text="${#temporals.format(invoice.postingDate, 'dd/MM/yyyy')}"></td>
                                <td th:text="${#temporals.format(invoice.dueDate, 'dd/MM/yyyy')}"></td>
                                <td th:text="${invoice.partyName}"></td>
                                <td>
                                    <span th:class="${invoice.status == 'Paid' ? 'badge bg-success' : 
                                        (invoice.status == 'Overdue' ? 'badge bg-danger' : 'badge bg-warning')}">
                                        [[${invoice.status}]]
                                    </span>
                                </td>
                                <td class="text-end" 
                                    th:text="${#numbers.formatDecimal(invoice.amount, 1, 2, 'COMMA') + ' ' + invoice.currency}"></td>
                                <td class="text-end">
                                    <button class="btn btn-sm btn-outline-primary"
                                            data-bs-toggle="modal" 
                                            data-bs-target="#invoiceModal">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                    <button class="btn btn-sm btn-outline-success"
                                            th:if="${invoice.status != 'Paid'}"
                                            data-bs-toggle="modal"
                                            data-bs-target="#paymentModal"
                                            th:data-invoice-id="${invoice.id}">
                                        <i class="fas fa-check-circle"></i>
                                    </button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
         <!-- Modal -->
        <div class="modal fade" id="invoiceModal" tabindex="-1">
            <div class="modal-dialog modal-xl">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Détails de la facture</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <!-- Contenu dynamique -->
                    </div>
                </div>
            </div>
        </div>
        <!-- Modal de Paiement -->
        <div class="modal fade" id="paymentModal" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Enregistrer un paiement</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <form id="paymentForm">
                        <div class="modal-body">
                            <div class="mb-3">
                                <label class="form-label">Méthode de paiement</label>
                                <select class="form-select" name="modeOfPayment" required>
                                    <option value="">Choisir...</option>
                                    <option value="Cash">Espèces</option>
                                    <option value="Check">Chèque</option>
                                    <option value="Bank Transfer">Virement bancaire</option>
                                    <option value="Credit Card">Carte de crédit</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Date de paiement</label>
                                <input type="date" class="form-control" name="paymentDate" required 
                                    th:value="${#temporals.format(#temporals.createToday(), 'yyyy-MM-dd')}">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Montant payé</label>
                                <input type="number" step="0.01" class="form-control" name="amount" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Référence paiement</label>
                                <input type="text" class="form-control" name="reference">
                            </div>
                            <!-- Paid From -->
                            <div class="mb-3">
                                <label class="form-label">Compte débité (Paid From)</label>
                                <select class="form-select" name="paidFrom" id="paidFromSelect" required>
                                    <option value="">Chargement…</option>
                                </select>
                            </div>
                            <!-- Paid To -->
                            <div class="mb-3">
                                <label class="form-label">Compte crédité (Paid To)</label>
                                <select class="form-select" name="paidTo" id="paidToSelect" required>
                                    <option value="">Chargement…</option>
                                </select>
                            </div>
                            <div class="mb-3" id="additionalFields">
                                <!-- Champs supplémentaires conditionnels -->
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
                            <button type="submit" class="btn btn-primary">Enregistrer</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
        <script th:inline="javascript">
            document.addEventListener('DOMContentLoaded', () => {
    
                // Gestion modal
                const modalElement = document.getElementById('invoiceModal');

                modalElement.addEventListener('show.bs.modal', e => {
                    const invoiceId = e.relatedTarget.closest('tr').dataset.invoiceId;
                    console.log(invoiceId);
                    fetch(`/purchase-invoices/${invoiceId}/items`)
                        .then(response => response.text())
                        .then(html => {
                            document.querySelector('#invoiceModal .modal-body').innerHTML = html;
                        });
                });
                // Dans la section script existante
                document.querySelector('select[name="modeOfPayment"]').addEventListener('change', function(e) {
                    const additionalFields = document.getElementById('additionalFields');
                    additionalFields.innerHTML = '';
                    
                    if (this.value === 'Check') {
                        additionalFields.innerHTML = `
                            <div class="mb-3">
                                <label class="form-label">Numéro de chèque</label>
                                <input type="text" class="form-control" name="checkNo">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Date d'échéance</label>
                                <input type="date" class="form-control" name="checkDate">
                            </div>
                        `;
                    }
                    else if (this.value === 'Bank Transfer') {
                        additionalFields.innerHTML = `
                            <div class="mb-3">
                                <label class="form-label">Référence bancaire</label>
                                <input type="text" class="form-control" name="bankRef">
                            </div>
                        `;
                    }
                });
                let currentInvoiceId, company, supplierCompany;
                const paidFromSelect = document.getElementById('paidFromSelect');
                const paidToSelect   = document.getElementById('paidToSelect');
                const paymentModal   = document.getElementById('paymentModal');

                paymentModal.addEventListener('show.bs.modal', ev => {
                    const row = ev.relatedTarget.closest('tr');
                    currentInvoiceId = row.dataset.invoiceId;
                    company          = row.dataset.company;

                    // Reset
                    paidFromSelect.innerHTML = '<option>Chargement…</option>';
                    paidToSelect  .innerHTML = '<option>Chargement…</option>';

                    // Fetch Paid From (Cash/Bank)
                    fetch(`/accounting/accounts?company=${company}&accountType=from`)
                    .then(r => r.json())
                    .then(list => {
                        paidFromSelect.innerHTML = `<option value="">--Choisir--</option>`
                        + list.map(n => `<option value="${n}">${n}</option>`).join('');
                    });

                    // Fetch Paid To (Payable)
                    fetch(`/accounting/accounts?company=${company}&accountType=to`)
                    .then(r => r.json())
                    .then(list => {
                        paidToSelect.innerHTML = `<option value="">--Choisir--</option>`
                        + list.map(n => `<option value="${n}">${n}</option>`).join('');
                    });
                });
                // Modification de la soumission du formulaire
                document.getElementById('paymentForm').addEventListener('submit', function(e) {
                    e.preventDefault();
                    
                    const formData = {
                        modeOfPayment: this.modeOfPayment.value,
                        paymentDate: this.paymentDate.value,
                        amount: this.amount.value,
                        reference: this.reference.value,
                        paidFrom: this.paidFrom.value,
                        paidTo: this.paidTo.value,
                        // Champs supplémentaires
                        checkNo: this.checkNo?.value,
                        checkDate: this.checkDate?.value,
                        bankRef: this.bankRef?.value
                    };

                    fetch(`/purchase-invoices/${currentInvoiceId}/pay`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(formData)
                    })
                    .then(response => response.json())
                    .then(data => {
                        if (data.success) {
                            paymentModal.hide();
                            window.location.reload();
                        } else {
                            alert('Erreur lors du paiement: ' + (data.error || ''));
                        }
                    })
                    .catch(error => {
                        console.error('Error:', error);
                        alert('Une erreur est survenue');
                    });
                });
                const paymentModalBoot = new bootstrap.Modal(document.getElementById('paymentModal'));
                document.querySelectorAll('.btn-outline-success').forEach(btn => {
                    btn.addEventListener('click', function() {
                        currentInvoiceId = this.dataset.invoiceId;
                    });
                });
            });
            
        </script>
    </div>

</body>
</html>
